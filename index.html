<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <title>Tarjetas</title>
    <link rel="icon" href="images/Icons-Land-Metro-Raster-Sport-Soccer-Ball.32.ico" type="image/x-icon">
    
    <script src="libs/html2pdf.bundle.min.js"></script>

    <link rel="stylesheet" href="css/cropper.min.css">

    <script src="libs/cropper.min.js"></script>

</head>
<body>
    <div class="base">
        <form id="formPersona">
            
            <img src="images/Logo.png" alt="Logo" id="logo">
    
            <label for="foto" class="botonFoto">Subir Foto</label>
    
            <input 
                type="file" 
                id="foto"
                accept="image/*"
            >

            <img id="fotoTarjeta">

            <label>Nacionalidad: </label>
            <input 
                type="text" 
                id="inputNacionalidad"
                class="ingresarDatos"
                placeholder="Argentina"
            >

            <label>Nombre: </label>
            <input 
                type="text" 
                id="inputNombre"
                class="ingresarDatos"
                placeholder="Nombre"
            >

            <label>Apellidos: </label>
            <input 
                type="text" 
                id="inputApellido"
                class="ingresarDatos"
                placeholder="Apellidos"
            >
    
            <label>Fecha de nacimiento: </label>
            <input 
                type="date" 
                id="inputNacimiento"
                class="ingresarDatos"
                placeholder="dd/mm/aaaa"
            >

            <label>DNI: </label>
            <input 
                type="text" 
                id="inputDNI"
                class="ingresarDatos"
                placeholder="12.345.678"
            >
    
            <label>Categoria: </label>
            <input 
                type="text" 
                id="inputCategoria"
                class="ingresarDatos"
                placeholder="1' ASCENSO"
            >
    
            <label>Legajo: </label>
            <input 
                type="text"
                id="inputLegajo"
                class="ingresarDatos"
                inputmode="numeric"
                pattern="[0-9]*"
                maxlength="4"
                placeholder="0001"
            >
    
            <label>Club: </label>
            <input 
                type="text" 
                id="inputClub"
                class="ingresarDatos"
                placeholder="Callejas"
            >
        
            <button type="button" id="guardar">
                Guardar datos
            </button>
    
        </form>
    </div>

    <div id="modalRecorte">

        <div id="ventanaRecorte">

            <h2>Recortar fotografía</h2>

            <div id="contenedorCropper">

                <img id="imagenRecortar">

            </div>

            <div id="botonesRecorte">

                <button id="cancelarRecorte" class="botonRecorte">
                    Cancelar
                </button>

                <button id="aceptarRecorte" class="botonRecorte">
                    Aceptar
                </button>

            </div>

        </div>

    </div>

    <script src="js/pdf.js"></script>

    <script src="js/control.js"></script>
    
</body>
</html>
